{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h2 class="h4 mb-3">Eliminar usuario</h2>
                <p>¿Está seguro que desea eliminar el usuario <strong>{{ object.get_full_name }}</strong>?</p>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Eliminar</button>
                    <a class="btn btn-outline-secondary" href="{% url 'academico:usuario_list' %}">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
